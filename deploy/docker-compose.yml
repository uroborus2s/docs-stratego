services:
  postgres:
    image: postgres:18-alpine
    container_name: casdoor-postgres
    # Docker Compose 会自动从同级目录的 .env 文件读取这些变量
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - /data/pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: always
    networks:
      - docs_internal
  casdoor:
    image: casbin/casdoor:latest
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - "127.0.0.1:8081:8000"
    environment:
      # 在这里拼接！让 Docker 帮你把变量替换成真实的值
      DB_DSN: "user=${DB_USER} password=${DB_PASSWORD} host=postgres port=5432 sslmode=disable dbname=${DB_NAME}"
    volumes:
      - ./casdoor/app.conf:/conf/app.conf
    networks:
      - docs_internal

  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:latest
    restart: unless-stopped
    depends_on:
      - casdoor
    ports:
      - "127.0.0.1:4180:4180"
    environment:
      - OAUTH2_PROXY_CLIENT_ID
      - OAUTH2_PROXY_CLIENT_SECRET
      - OAUTH2_PROXY_COOKIE_SECRET
    volumes:
      - ./oauth2-proxy/oauth2-proxy.cfg:/etc/oauth2-proxy/oauth2-proxy.cfg:ro
    command:
      - --config=/etc/oauth2-proxy/oauth2-proxy.cfg
    networks:
      - docs_internal
      - redis_shared

networks:
  docs_internal:
    external: true
    name: ${DOCS_INTERNAL_DOCKER_NETWORK:-docs-auth-internal}
  redis_shared:
    external: true
    name: ${DOCS_REDIS_DOCKER_NETWORK:-webapp_wps_net}
