provider = "oidc"
oidc_issuer_url = "https://auth.docs.example.com"
redirect_url = "https://docs.example.com/oauth2/callback"
http_address = "0.0.0.0:4180"
client_id = "replace-with-casdoor-client-id"
client_secret = "replace-with-casdoor-client-secret"
cookie_secret = "MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY="
cookie_secure = true
cookie_domains = [ "docs.example.com" ]
whitelist_domains = [ ".example.com" ]
email_domains = [ "*" ]
upstreams = [ "static://202" ]
reverse_proxy = true
set_xauthrequest = true
pass_access_token = true
pass_authorization_header = true
scope = "openid profile email"
code_challenge_method = "S256"
session_store_type = "redis"
redis_connection_url = "redis://redis:6379/0"
cookie_refresh = "1h"
cookie_expire = "12h"
skip_provider_button = true