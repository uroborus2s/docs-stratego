<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Server deployment layout mock screenshot</title>
  <desc id="desc">Illustrative deployment layout showing GitHub Actions artifacts, server directories, Docker auth stack, and host Nginx.</desc>
  <rect width="1200" height="760" fill="#f5f7fb"/>
  <text x="56" y="76" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#111827">部署拓扑与运行目录</text>
  <text x="56" y="112" font-family="Arial, sans-serif" font-size="20" fill="#475569">先在 Runner 构建，再把静态产物和私有规则文件部署到服务器。服务器只承载运行时内容。</text>

  <rect x="56" y="156" width="292" height="476" rx="18" fill="#ffffff" stroke="#d0d7de"/>
  <text x="88" y="198" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">GitHub Actions Runner</text>
  <g font-family="Arial, sans-serif" font-size="18" fill="#334155">
    <text x="88" y="246">1. `docs-stratego sync --source-mode remote`</text>
    <text x="88" y="282">2. `docs-stratego build --source-mode remote`</text>
    <text x="88" y="318">3. `mkdocs build`</text>
  </g>
  <rect x="88" y="356" width="228" height="138" rx="14" fill="#eff6ff" stroke="#60a5fa"/>
  <text x="114" y="396" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#1d4ed8">Artifacts</text>
  <text x="114" y="430" font-family="Arial, sans-serif" font-size="18" fill="#1f2937">site/</text>
  <text x="114" y="460" font-family="Arial, sans-serif" font-size="18" fill="#1f2937">private_locations.conf</text>
  <text x="114" y="490" font-family="Arial, sans-serif" font-size="18" fill="#1f2937">保留 7 天供排障</text>

  <rect x="454" y="156" width="308" height="476" rx="18" fill="#ffffff" stroke="#d0d7de"/>
  <text x="486" y="198" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">服务器文件布局</text>
  <g font-family="Courier New, monospace" font-size="18" fill="#0f172a">
    <text x="486" y="246">~/docs-stratego/deploy/</text>
    <text x="486" y="280">/var/www/docs-stratego/</text>
    <text x="486" y="314">/etc/nginx/snippets/docs-stratego/</text>
  </g>
  <g font-family="Arial, sans-serif" font-size="18" fill="#334155">
    <text x="486" y="372">只保留运行时目录：</text>
    <text x="504" y="406">- Docker Compose 配置</text>
    <text x="504" y="438">- Casdoor / oauth2-proxy 配置</text>
    <text x="504" y="470">- 静态站点文件</text>
    <text x="504" y="502">- 私有页面 Nginx 规则</text>
  </g>
  <rect x="486" y="536" width="242" height="50" rx="12" fill="#dcfce7" stroke="#22c55e"/>
  <text x="514" y="568" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#166534">服务器不负责本地构建</text>

  <rect x="868" y="156" width="276" height="476" rx="18" fill="#ffffff" stroke="#d0d7de"/>
  <text x="900" y="198" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">运行时组件</text>
  <rect x="900" y="236" width="212" height="56" rx="14" fill="#f8fafc" stroke="#d0d7de"/>
  <text x="964" y="270" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#111827">Host Nginx</text>
  <rect x="900" y="320" width="212" height="56" rx="14" fill="#f8fafc" stroke="#d0d7de"/>
  <text x="942" y="354" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#111827">oauth2-proxy</text>
  <rect x="900" y="404" width="212" height="56" rx="14" fill="#f8fafc" stroke="#d0d7de"/>
  <text x="972" y="438" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#111827">Casdoor</text>
  <rect x="900" y="488" width="212" height="56" rx="14" fill="#f8fafc" stroke="#d0d7de"/>
  <text x="986" y="522" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#111827">Redis</text>
  <text x="900" y="590" font-family="Arial, sans-serif" font-size="18" fill="#334155">宿主机 Nginx 处理：</text>
  <text x="918" y="620" font-family="Arial, sans-serif" font-size="18" fill="#334155">- 静态站点</text>
  <text x="918" y="648" font-family="Arial, sans-serif" font-size="18" fill="#334155">- 私有路径鉴权转发</text>

  <path d="M348 430 C390 430, 402 430, 454 430" fill="none" stroke="#2563eb" stroke-width="5"/>
  <polygon points="454,430 438,422 438,438" fill="#2563eb"/>
  <path d="M762 430 C804 430, 816 430, 868 430" fill="none" stroke="#2563eb" stroke-width="5"/>
  <polygon points="868,430 852,422 852,438" fill="#2563eb"/>
</svg>
