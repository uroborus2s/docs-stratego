<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Source repository onboarding flow mock screenshot</title>
  <desc id="desc">Illustrative step-by-step flow showing source validation, root registration, and remote build verification.</desc>
  <rect width="1200" height="760" fill="#f5f7fb"/>
  <text x="56" y="76" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#111827">接入新源仓的最短闭环</text>
  <text x="56" y="112" font-family="Arial, sans-serif" font-size="20" fill="#475569">先在源仓校验，再在根仓登记，最后用 remote 模式做一次真实构建验证。</text>

  <rect x="56" y="156" width="326" height="450" rx="20" fill="#ffffff" stroke="#d0d7de"/>
  <rect x="56" y="156" width="326" height="58" rx="20" fill="#ecfdf5"/>
  <circle cx="96" cy="191" r="18" fill="#16a34a"/>
  <text x="91" y="197" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff">1</text>
  <text x="128" y="197" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#166534">源仓校验</text>
  <g font-family="Courier New, monospace" font-size="18" fill="#0f172a">
    <text x="84" y="260">uvx --from 'docs-stratego==&lt;version&gt;'</text>
    <text x="84" y="290">docs-stratego source validate</text>
    <text x="84" y="320">--repo-path /path/to/source-repo</text>
  </g>
  <g font-family="Arial, sans-serif" font-size="18" fill="#334155">
    <text x="84" y="392">你要确认：</text>
    <text x="102" y="426">- 根 `docs/index.md` 合法</text>
    <text x="102" y="456">- 导航声明的页面都存在</text>
    <text x="102" y="486">- 每个目录都有 `index.md`</text>
    <text x="102" y="516">- 契约文件最低要求通过</text>
  </g>
  <rect x="84" y="548" width="270" height="40" rx="10" fill="#dcfce7" stroke="#22c55e"/>
  <text x="120" y="574" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#166534">成功标志：校验命令无错误退出</text>

  <rect x="438" y="156" width="326" height="450" rx="20" fill="#ffffff" stroke="#d0d7de"/>
  <rect x="438" y="156" width="326" height="58" rx="20" fill="#eff6ff"/>
  <circle cx="478" cy="191" r="18" fill="#2563eb"/>
  <text x="473" y="197" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff">2</text>
  <text x="510" y="197" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#1d4ed8">根仓登记</text>
  <g font-family="Courier New, monospace" font-size="17" fill="#0f172a">
    <text x="466" y="252">uv run docs-stratego source add \</text>
    <text x="466" y="280">  --name atlas --title 星图 \</text>
    <text x="466" y="308">  --repo-url https://github.com/... \</text>
    <text x="466" y="336">  --git-url https://github.com/...git \</text>
    <text x="466" y="364">  --local-path ../atlas/docs --branch main</text>
  </g>
  <g font-family="Arial, sans-serif" font-size="18" fill="#334155">
    <text x="466" y="430">你要确认：</text>
    <text x="484" y="464">- `config/source-repos.json` 已新增条目</text>
    <text x="484" y="494">- 需要 remote 时可追加 `--register-submodule`</text>
    <text x="484" y="524">- 想先演练时加 `--dry-run`</text>
  </g>
  <rect x="466" y="548" width="270" height="40" rx="10" fill="#dbeafe" stroke="#2563eb"/>
  <text x="492" y="574" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#1d4ed8">成功标志：配置条目与子模块路径一致</text>

  <rect x="820" y="156" width="326" height="450" rx="20" fill="#ffffff" stroke="#d0d7de"/>
  <rect x="820" y="156" width="326" height="58" rx="20" fill="#fff7ed"/>
  <circle cx="860" cy="191" r="18" fill="#ea580c"/>
  <text x="855" y="197" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff">3</text>
  <text x="892" y="197" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#c2410c">真实构建验证</text>
  <g font-family="Courier New, monospace" font-size="17" fill="#0f172a">
    <text x="848" y="252">uv run docs-stratego sync</text>
    <text x="848" y="280">--project-root . --source-mode remote</text>
    <text x="848" y="330">uv run docs-stratego build</text>
    <text x="848" y="358">--project-root . --source-mode remote</text>
    <text x="848" y="408">uv run mkdocs build -f .generated/...</text>
  </g>
  <g font-family="Arial, sans-serif" font-size="18" fill="#334155">
    <text x="848" y="472">你要确认：</text>
    <text x="866" y="506">- 远程仓能真实拉取</text>
    <text x="866" y="536">- 页面、权限、契约都能生成</text>
    <text x="866" y="566">- 构建器没有未声明页面错误</text>
  </g>

  <path d="M382 380 C416 380, 414 380, 438 380" fill="none" stroke="#2563eb" stroke-width="5"/>
  <polygon points="438,380 422,372 422,388" fill="#2563eb"/>
  <path d="M764 380 C798 380, 796 380, 820 380" fill="none" stroke="#ea580c" stroke-width="5"/>
  <polygon points="820,380 804,372 804,388" fill="#ea580c"/>

  <rect x="56" y="644" width="1090" height="76" rx="18" fill="#ffffff" stroke="#d0d7de"/>
  <text x="88" y="690" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#111827">别跳过第 3 步</text>
  <text x="218" y="690" font-family="Arial, sans-serif" font-size="18" fill="#475569">很多接入问题不会在本地源仓校验阶段暴露，只有 remote 模式的真实同步和构建才会发现。</text>
</svg>
