<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Site reader login popup mock screenshot</title>
  <desc id="desc">Illustrative screenshot showing a docs page in the background and the login popup triggered by opening a private page.</desc>
  <rect width="1200" height="760" fill="#f5f7fb"/>
  <rect x="28" y="28" width="1144" height="704" rx="18" fill="#ffffff" stroke="#d0d7de"/>
  <rect x="28" y="28" width="1144" height="56" rx="18" fill="#edf2f7" stroke="#d0d7de"/>
  <circle cx="66" cy="56" r="8" fill="#f97316"/>
  <circle cx="92" cy="56" r="8" fill="#facc15"/>
  <circle cx="118" cy="56" r="8" fill="#22c55e"/>
  <text x="156" y="63" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#1f2937">https://docs.example.com/docs-stratego/</text>

  <rect x="60" y="114" width="250" height="560" rx="14" fill="#f8fafc" stroke="#d0d7de"/>
  <text x="92" y="156" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">导航</text>
  <g font-family="Arial, sans-serif" font-size="18" fill="#475569">
    <text x="92" y="208">入门说明</text>
    <text x="112" y="246">项目概览</text>
    <text x="112" y="282">快速开始</text>
    <text x="92" y="338">用户指南</text>
    <text x="112" y="376">阅读者指南</text>
    <text x="112" y="412">本地开发与预览</text>
    <text x="112" y="448">维护者指南</text>
    <text x="112" y="484">项目开发文档（内）</text>
  </g>
  <rect x="100" y="462" width="170" height="38" rx="10" fill="#fee2e2" stroke="#ef4444"/>
  <text x="122" y="487" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#b91c1c">点击后触发登录</text>

  <rect x="336" y="114" width="794" height="560" rx="14" fill="#ffffff" stroke="#d0d7de"/>
  <text x="380" y="176" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#111827">章略·墨衡</text>
  <text x="380" y="214" font-family="Arial, sans-serif" font-size="20" fill="#475569">公开页可以直接阅读，只有私有页才会弹出登录小窗。</text>
  <rect x="380" y="252" width="706" height="96" rx="16" fill="#eff6ff" stroke="#60a5fa"/>
  <text x="412" y="296" font-family="Arial, sans-serif" font-size="21" font-weight="700" fill="#1d4ed8">当前操作</text>
  <text x="412" y="326" font-family="Arial, sans-serif" font-size="18" fill="#1f2937">用户点击了一个 `access: private` 的页面，系统开始登录流程。</text>
  <g font-family="Arial, sans-serif" font-size="19" fill="#334155">
    <text x="380" y="406">1. 主页面保持当前位置，不会整页跳走</text>
    <text x="380" y="444">2. 浏览器弹出独立登录小窗</text>
    <text x="380" y="482">3. 登录成功后，小窗自动关闭</text>
    <text x="380" y="520">4. 主页面继续跳到目标私有页</text>
  </g>

  <rect x="670" y="162" width="360" height="404" rx="18" fill="#ffffff" stroke="#2563eb" stroke-width="3"/>
  <rect x="670" y="162" width="360" height="54" rx="18" fill="#dbeafe"/>
  <text x="704" y="196" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#1d4ed8">登录小窗</text>
  <text x="704" y="254" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#111827">继续访问私有页面</text>
  <text x="704" y="286" font-family="Arial, sans-serif" font-size="18" fill="#475569">可以使用 GitHub 登录，也可以用本地账号密码。</text>
  <rect x="704" y="322" width="292" height="52" rx="12" fill="#111827"/>
  <text x="786" y="355" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#ffffff">Continue with GitHub</text>
  <rect x="704" y="392" width="292" height="52" rx="12" fill="#eff6ff" stroke="#2563eb"/>
  <text x="792" y="425" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#1d4ed8">Use local account</text>
  <rect x="704" y="470" width="292" height="62" rx="12" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="730" y="506" font-family="Arial, sans-serif" font-size="18" fill="#334155">登录成功后：popup-complete.html 通知主窗口</text>

  <rect x="60" y="692" width="1070" height="26" rx="13" fill="#e2e8f0"/>
  <rect x="760" y="692" width="220" height="26" rx="13" fill="#60a5fa"/>
  <text x="60" y="716" font-family="Arial, sans-serif" font-size="16" fill="#475569">阅读体验要点：公开页不打断阅读，只有真正进入私有页时才要求登录</text>
</svg>
