name: Validate Source Pointer PR

concurrency:
  group: validate-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

on:
  pull_request:
    branches:
      - main
      - master

jobs:
  validate:
    if: github.head_ref == 'bot/sync-source-pointers'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run unit tests
        run: uv run python -m unittest tests.test_source_sync tests.test_site_builder tests.test_deploy_stack tests.test_sync_source_pointers

      - name: Create source repo GitHub App token
        id: source-app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.DOCS_SOURCE_APP_ID }}
          private-key: ${{ secrets.DOCS_SOURCE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Configure source repo credentials from GitHub App
        run: git config --global url."https://x-access-token:${{ steps.source-app-token.outputs.token }}@github.com/".insteadOf https://github.com/

      - name: Sync sources (Remote Mode)
        run: uv run python scripts/sync_sources.py --config config/source-repos.json --project-root . --source-mode remote

      - name: Build site metadata
        run: uv run python scripts/build_site.py --config config/source-repos.json --project-root . --output-dir .generated --source-mode remote

      - name: Build MkDocs site
        run: uv run mkdocs build -f .generated/mkdocs.generated.yml -d "$GITHUB_WORKSPACE/site"
