name: Deploy Docs

concurrency:
  group: docs-deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install site build dependencies
        run: uv sync --frozen --extra site

      - name: Run unit tests
        run: uv run python -m unittest tests.test_source_sync tests.test_site_builder tests.test_deploy_stack tests.test_sync_source_pointers tests.test_source_admin tests.test_cli

      - name: Validate source repo GitHub App config
        env:
          DOCS_SOURCE_APP_ID: ${{ vars.DOCS_SOURCE_APP_ID }}
          DOCS_SOURCE_APP_PRIVATE_KEY: ${{ secrets.DOCS_SOURCE_APP_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          test -n "$DOCS_SOURCE_APP_ID" || { echo "Missing Actions variable: DOCS_SOURCE_APP_ID" >&2; exit 1; }
          test -n "$DOCS_SOURCE_APP_PRIVATE_KEY" || { echo "Missing Actions secret: DOCS_SOURCE_APP_PRIVATE_KEY" >&2; exit 1; }

      - name: Create source repo GitHub App token
        id: source-app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.DOCS_SOURCE_APP_ID }}
          private-key: ${{ secrets.DOCS_SOURCE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          permission-contents: read

      - name: Configure source repo credentials from GitHub App
        run: git config --global url."https://x-access-token:${{ steps.source-app-token.outputs.token }}@github.com/".insteadOf https://github.com/

      - name: Sync sources
        run: uv run docs-stratego sync --config config/source-repos.json --project-root . --source-mode remote

      - name: Build site metadata
        run: uv run docs-stratego build --config config/source-repos.json --project-root . --output-dir .generated --source-mode remote

      - name: Build MkDocs site
        run: uv run mkdocs build -f .generated/mkdocs.generated.yml -d "$GITHUB_WORKSPACE/site"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-build-output
          path: |
            site
            .generated/nginx/private_locations.conf
          if-no-files-found: error
          retention-days: 7

  deploy:
    needs: validate
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: docs-build-output
          path: .

      - name: Prepare upload bundle
        run: |
          set -euo pipefail
          tar -czf site.tar.gz site
          cp .generated/nginx/private_locations.conf private_locations.conf

      - name: Ensure remote directories
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DOCS_DEPLOY_HOST }}
          username: ${{ secrets.DOCS_DEPLOY_USER }}
          key: ${{ secrets.DOCS_DEPLOY_SSH_KEY }}
          port: ${{ secrets.DOCS_DEPLOY_PORT || '22' }}
          script_stop: true
          script: |
            set -euxo pipefail
            SITE_DIR="${{ secrets.DOCS_DEPLOY_SITE_DIR }}"
            if [ -z "$SITE_DIR" ]; then
              SITE_DIR="/var/www/docs-stratego"
            fi
            PRIVATE_LOCATIONS_PATH="${{ secrets.DOCS_PRIVATE_LOCATIONS_PATH }}"
            if [ -z "$PRIVATE_LOCATIONS_PATH" ]; then
              PRIVATE_LOCATIONS_PATH="/etc/nginx/snippets/docs-stratego/private_locations.conf"
            fi
            TMP_DIR="$HOME/.docs-stratego-deploy-tmp"
            echo "Preparing remote directories"
            echo "SITE_DIR=$SITE_DIR"
            echo "PRIVATE_LOCATIONS_PATH=$PRIVATE_LOCATIONS_PATH"
            echo "TMP_DIR=$TMP_DIR"
            mkdir -p "$TMP_DIR"
            sudo install -d -m 0755 "$SITE_DIR"
            sudo install -d -m 0755 "$(dirname "$PRIVATE_LOCATIONS_PATH")"

      - name: Upload site tarball
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DOCS_DEPLOY_HOST }}
          username: ${{ secrets.DOCS_DEPLOY_USER }}
          key: ${{ secrets.DOCS_DEPLOY_SSH_KEY }}
          port: ${{ secrets.DOCS_DEPLOY_PORT || '22' }}
          source: "site.tar.gz,private_locations.conf"
          target: ".docs-stratego-deploy-tmp"

      - name: Publish site and rules
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DOCS_DEPLOY_HOST }}
          username: ${{ secrets.DOCS_DEPLOY_USER }}
          key: ${{ secrets.DOCS_DEPLOY_SSH_KEY }}
          port: ${{ secrets.DOCS_DEPLOY_PORT || '22' }}
          script_stop: true
          script: |
            set -euxo pipefail
            SITE_DIR="${{ secrets.DOCS_DEPLOY_SITE_DIR }}"
            if [ -z "$SITE_DIR" ]; then
              SITE_DIR="/var/www/docs-stratego"
            fi
            PRIVATE_LOCATIONS_PATH="${{ secrets.DOCS_PRIVATE_LOCATIONS_PATH }}"
            if [ -z "$PRIVATE_LOCATIONS_PATH" ]; then
              PRIVATE_LOCATIONS_PATH="/etc/nginx/snippets/docs-stratego/private_locations.conf"
            fi
            TMP_DIR="$HOME/.docs-stratego-deploy-tmp"
            STAGING_DIR="$TMP_DIR/site-staging"
            echo "Publishing uploaded bundle"
            echo "SITE_DIR=$SITE_DIR"
            echo "PRIVATE_LOCATIONS_PATH=$PRIVATE_LOCATIONS_PATH"
            echo "TMP_DIR=$TMP_DIR"
            test -f "$TMP_DIR/site.tar.gz" || { echo "Missing uploaded bundle: $TMP_DIR/site.tar.gz" >&2; exit 1; }
            test -f "$TMP_DIR/private_locations.conf" || { echo "Missing uploaded rules: $TMP_DIR/private_locations.conf" >&2; exit 1; }
            ls -la "$TMP_DIR"
            mkdir -p "$TMP_DIR"
            rm -rf "$STAGING_DIR"
            mkdir -p "$STAGING_DIR"
            tar -xzf "$TMP_DIR/site.tar.gz" -C "$STAGING_DIR"
            sudo rm -rf "$SITE_DIR"
            sudo mv "$STAGING_DIR/site" "$SITE_DIR"
            sudo find "$SITE_DIR" -type d -exec chmod 0755 {} +
            sudo find "$SITE_DIR" -type f -exec chmod 0644 {} +
            sudo install -m 0644 "$TMP_DIR/private_locations.conf" "$PRIVATE_LOCATIONS_PATH"
            rm -rf "$STAGING_DIR"
            rm -f "$TMP_DIR/site.tar.gz" "$TMP_DIR/private_locations.conf"
            if [ "${{ secrets.DOCS_RELOAD_HOST_NGINX || '1' }}" = "1" ]; then
              sudo nginx -t
              if command -v systemctl >/dev/null 2>&1; then
                sudo systemctl reload nginx
              else
                sudo nginx -s reload
              fi
            fi
