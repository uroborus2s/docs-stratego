name: Sync Source Pointers

concurrency:
  group: sync-source-pointers
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

on:
  repository_dispatch:
    types:
      - source-pointer-sync-requested
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          submodules: false
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Validate sync credentials
        env:
          DOCS_SOURCE_APP_ID: ${{ vars.DOCS_SOURCE_APP_ID }}
          DOCS_SOURCE_APP_PRIVATE_KEY: ${{ secrets.DOCS_SOURCE_APP_PRIVATE_KEY }}
          DOCS_STRATEGO_SYNC_PAT: ${{ secrets.DOCS_STRATEGO_SYNC_PAT }}
        run: |
          set -euo pipefail
          test -n "$DOCS_SOURCE_APP_ID" || { echo "Missing Actions variable: DOCS_SOURCE_APP_ID" >&2; exit 1; }
          test -n "$DOCS_SOURCE_APP_PRIVATE_KEY" || { echo "Missing Actions secret: DOCS_SOURCE_APP_PRIVATE_KEY" >&2; exit 1; }
          test -n "$DOCS_STRATEGO_SYNC_PAT" || { echo "Missing Actions secret: DOCS_STRATEGO_SYNC_PAT" >&2; exit 1; }

      - name: Create source repo GitHub App token
        id: source-app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.DOCS_SOURCE_APP_ID }}
          private-key: ${{ secrets.DOCS_SOURCE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          permission-contents: read

      - name: Configure Git credentials
        run: |
          set -euo pipefail
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global url."https://x-access-token:${{ steps.source-app-token.outputs.token }}@github.com/".insteadOf https://github.com/
          git remote set-url origin "https://x-access-token:${{ secrets.DOCS_STRATEGO_SYNC_PAT }}@github.com/${{ github.repository }}.git"

      - name: Sync and Create PR
        env:
          GH_TOKEN: ${{ secrets.DOCS_STRATEGO_SYNC_PAT }}
        run: |
          uv run docs-stratego source sync-pointers --config config/source-repos.json --project-root .
